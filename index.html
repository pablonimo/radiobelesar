<!doctype html>
<html lang="gl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Radio Belesar — A voz da infancia</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- Pantalla de acceso -->
    <div id="login" class="login-overlay">
      <form id="login-form" class="login-card" autocomplete="off">
        <h1>Radio Belesar</h1>
        <p class="tagline">A voz da infancia</p>
        <input
          id="login-password"
          type="password"
          placeholder="Clave de acceso"
          aria-label="Clave de acceso"
        />
        <button type="submit">Entrar</button>
        <p id="login-error" class="error" hidden></p>
      </form>
    </div>

    <!-- Aplicación -->
    <div id="app" hidden>
      <header class="topbar">
        <div class="brand">
          <strong>Radio Belesar</strong>
          <span>— A voz da infancia</span>
        </div>
        <div class="topbar-actions">
          <button id="btn-password" class="ghost" title="Cambiar a clave">Clave</button>
          <button id="btn-panic" class="panic" title="Parar todos os sons">■ Parar todo</button>
        </div>
      </header>

      <main id="grid" class="grid" aria-label="Mesa de son"></main>

      <footer id="bottombar" class="bottombar" hidden></footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

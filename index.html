<!doctype html>
<html lang="gl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Radio Belesar — A voz da infancia</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2a7f7a" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- Modal de clave (só para entrar no modo de edición) -->
    <div id="login" class="login-overlay" hidden>
      <form id="login-form" class="login-card" autocomplete="off">
        <h1>Modificar</h1>
        <p class="tagline">Introduce a clave para editar os sons</p>
        <input
          id="login-password"
          type="password"
          placeholder="Clave"
          aria-label="Clave"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
        />
        <button type="submit">Entrar</button>
        <button type="button" id="login-cancel" class="ghost-dark">Cancelar</button>
        <p id="login-error" class="error" hidden></p>
      </form>
    </div>

    <!-- Aplicación (usable sen clave) -->
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="/logo.png" onerror="this.onerror=null;this.src='/logo.svg'" width="40" height="40" alt="CEIP Belesar" />
          <strong>Radio Belesar</strong>
          <span class="brand-tag">— A voz da infancia</span>
        </div>
        <div class="topbar-actions">
          <a
            class="school-link"
            href="http://www.edu.xunta.gal/centros/ceipbelesar"
            target="_blank"
            rel="noopener"
            >CEIP Plurilíngüe de Belesar (Baiona)</a
          >
          <nav class="social" aria-label="Redes sociais">
            <a href="https://www.instagram.com/ceip.belesar/" target="_blank" rel="noopener" title="Instagram" aria-label="Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true"><defs><radialGradient id="igGrad" cx="0.3" cy="1" r="1.2"><stop offset="0" stop-color="#fdd87d"/><stop offset="0.25" stop-color="#fa9137"/><stop offset="0.5" stop-color="#f7404f"/><stop offset="0.75" stop-color="#d4308f"/><stop offset="1" stop-color="#8a3ab9"/></radialGradient></defs><rect width="24" height="24" rx="6" fill="url(#igGrad)"/><g fill="none" stroke="#fff" stroke-width="1.8"><rect x="6" y="6" width="12" height="12" rx="3.6"/><circle cx="12" cy="12" r="3"/></g><circle cx="16.4" cy="7.6" r="1.1" fill="#fff"/></svg>
            </a>
            <a href="https://whatsapp.com/channel/0029VaCFs4r7DAWrmGoz1X0e" target="_blank" rel="noopener" title="WhatsApp" aria-label="WhatsApp">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="6" fill="#25D366"/><path fill="#fff" d="M12 5.5a6.5 6.5 0 0 0-5.6 9.8L5.7 18.3l3.1-.8A6.5 6.5 0 1 0 12 5.5Zm0 1.4a5.1 5.1 0 1 1-2.6 9.5l-.3-.18-1.6.42.43-1.55-.2-.32A5.1 5.1 0 0 1 12 6.9Zm-2 2.3c-.1 0-.27.04-.4.2-.14.16-.55.54-.55 1.3 0 .77.56 1.5.64 1.6.08.1 1.1 1.76 2.73 2.4 1.36.53 1.63.43 1.93.4.3-.02.95-.39 1.08-.76.13-.37.13-.69.1-.76-.04-.06-.15-.1-.32-.18-.16-.08-.95-.47-1.1-.52-.14-.05-.25-.08-.36.08-.1.16-.4.52-.5.62-.08.1-.17.12-.33.04-.16-.08-.69-.25-1.3-.8-.49-.43-.81-.97-.91-1.13-.1-.16-.01-.25.07-.32l.24-.28c.08-.1.1-.16.16-.27.05-.1.03-.2-.01-.28-.04-.08-.36-.9-.5-1.22-.12-.3-.25-.26-.34-.26Z"/></svg>
            </a>
            <a href="https://www.ivoox.com/escuchar-audios-biblioteca-ceip-belesar_al_33276486_1.html?show=programs" target="_blank" rel="noopener" title="iVoox" aria-label="iVoox">
              <img src="/ivoox.png" alt="iVoox" width="30" height="30" />
            </a>
            <a href="https://www.youtube.com/@ceipbelesarbaiona" target="_blank" rel="noopener" title="YouTube" aria-label="YouTube">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="6" fill="#FF0000"/><path fill="#fff" d="M10 8.3 16 12l-6 3.7z"/></svg>
            </a>
          </nav>
          <button id="btn-password" class="ghost edit-only" title="Cambiar a clave">Clave</button>
          <button id="btn-modify" class="ghost" title="Modificar os sons">Modificar</button>
          <button id="btn-panic" class="panic" title="Parar todos os sons">■ Parar todo</button>
        </div>
      </header>

      <nav id="banks" class="banks" aria-label="Bancos de sons">
        <span class="banks-label">Banco</span>
        <button class="bank-btn" data-bank="1" aria-label="Banco 1 (F1)">1</button>
        <button class="bank-btn" data-bank="2" aria-label="Banco 2 (F2)">2</button>
        <button class="bank-btn" data-bank="3" aria-label="Banco 3 (F3)">3</button>
        <button class="bank-btn" data-bank="4" aria-label="Banco 4 (F4)">4</button>
        <span class="banks-hint">A fila de números soa en todos os bancos · F1–F4 para cambiar</span>
      </nav>

      <div class="body">
        <main id="grid" class="grid" aria-label="Mesa de son"></main>
        <aside id="active" class="active-col" aria-label="Audios activos">
          <h2 class="active-title">Activos</h2>
          <div id="active-list" class="active-list"></div>
        </aside>
      </div>

      <p id="quote" class="quote" aria-hidden="true"></p>

      <footer id="bottombar" class="bottombar" hidden></footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
